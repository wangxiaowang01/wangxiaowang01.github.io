                <h1 id="HD钱包助记词生成"><a href="#HD钱包助记词生成" class="headerlink" title="HD钱包助记词生成"></a>HD钱包助记词生成</h1><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-comment"># 生成助记词</span><br><br><span class="hljs-comment"># 1.1.随机熵生成</span><br><span class="hljs-comment"># 首先生成一段随机熵（Entropy）。熵的长度可以是 128 到 256 位，并且是 32 的倍数。常见的熵长度有 128 位（12 个助记词）和 256 位（24 个助记词）。</span><br><br><br><span class="hljs-keyword">import</span> hashlib<br><span class="hljs-keyword">import</span> os<br><span class="hljs-keyword">import</span> bip39<br><br><span class="hljs-comment"># 1.1.随机熵生成</span><br><span class="hljs-comment"># entropy = os.urandom(16) # os模块的生成16位的随机字节</span><br>entropy = <span class="hljs-string">b&#x27;\xfb\xe50\xc5\x84\xb6\x06&#123;.n\x12\x06SN\xb5\x82&#x27;</span><br><span class="hljs-built_in">print</span>(entropy)<br><br><span class="hljs-string">&quot;&quot;&quot;</span><br><span class="hljs-string">1.2.计算校验和</span><br><span class="hljs-string">对熵进行 SHA-256 哈希计算，并取哈希值的前几位作为校验和。sub scrip table</span><br><span class="hljs-string">校验和的长度取决于熵的长度。例如，128 位熵需要 4 位校验和（因为 128 / 32 = 4），256 位熵需要 8 位校验和</span><br><span class="hljs-string">最后截取前4位出来即可</span><br><span class="hljs-string">&quot;&quot;&quot;</span><br>entropy_sha256 = hashlib.sha256(entropy).digest()<br><span class="hljs-built_in">print</span>(entropy_sha256)<br><span class="hljs-comment"># print(bin(entropy_sha256[0])[2:].zfill(8))</span><br>entropy_bin = <span class="hljs-built_in">bin</span>(entropy_sha256[<span class="hljs-number">0</span>])[<span class="hljs-number">2</span>:].zfill(<span class="hljs-number">8</span>)[:<span class="hljs-number">4</span>]<br><span class="hljs-built_in">print</span>(entropy_bin)<br><span class="hljs-string">&quot;&quot;&quot;</span><br><span class="hljs-string">1.3.组合熵和校验</span><br><span class="hljs-string">将校验和附加到熵的末尾，形成一个新的二进制序列。这个序列的总长度为 (熵的长度 + 校验和的长度)。</span><br><span class="hljs-string">&quot;&quot;&quot;</span><br>entropy_bits = <span class="hljs-string">&#x27;&#x27;</span>.join([<span class="hljs-built_in">bin</span>(byte)[<span class="hljs-number">2</span>:].zfill(<span class="hljs-number">8</span>)<br>                       <span class="hljs-keyword">for</span> byte <span class="hljs-keyword">in</span> entropy])  <span class="hljs-comment"># 这一步是生成校验和</span><br><span class="hljs-comment"># 把校验和拼接到熵的末尾</span><br>combined_bits = entropy_bits+entropy_bin<br><br><br><span class="hljs-string">&quot;&quot;&quot;</span><br><span class="hljs-string">1.4 分割为助记词索引，等下去助记词库里面那助记词</span><br><span class="hljs-string">&quot;&quot;&quot;</span><br>indices = [<span class="hljs-built_in">int</span>(combined_bits[i:i + <span class="hljs-number">11</span>], <span class="hljs-number">2</span>)<br>           <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-built_in">len</span>(combined_bits), <span class="hljs-number">11</span>)]<br><span class="hljs-built_in">print</span>(indices)  <span class="hljs-comment"># 这是一个列表，里面有12个数字索引，</span><br><br><span class="hljs-string">&quot;&quot;&quot;</span><br><span class="hljs-string">1.5 映射为助记词，就是通过上面的索引列表去助记词库里面拿到对应的助记词</span><br><span class="hljs-string">&quot;&quot;&quot;</span><br>wordlist = bip39.INDEX_TO_WORD_TABLE  <span class="hljs-comment"># bip39.INDEX_TO_WORD_TABLE 返回出来的是2048个助记词单词组成的元组</span><br><br>mnemonic = <span class="hljs-string">&#x27; &#x27;</span>.join(wordlist[index] <span class="hljs-keyword">for</span> index <span class="hljs-keyword">in</span> indices)<br><span class="hljs-built_in">print</span>(mnemonic)<br></code></pre></td></tr></table></figure>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
